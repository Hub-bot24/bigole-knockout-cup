<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover" />
  <meta name="theme-color" content="#020403" />
  <title>BIGOLE Knockout Cup</title>
  <link rel="stylesheet" href="styles.css?v=exact-map-1" />
</head>
<body>
  <div id="rotateGate">
    <div><div class="phone">↻</div><strong>Rotate your phone</strong><span>This finals map is landscape only.</span></div>
  </div>

  <main id="viewport">
    <section id="stage" aria-label="BIGOLE Knockout Cup finals bracket">
      <svg id="bracket" viewBox="0 0 1116 644" role="img" aria-labelledby="title desc">
        <title id="title">BIGOLE Knockout Cup Top 8 Finals Series</title>
        <desc id="desc">Top four qualifying winners skip week two. Qualifying losers enter the semi finals. Elimination-final winners enter the semi finals.</desc>

        <defs>
          <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
            <feGaussianBlur stdDeviation="3.2" result="blur"/>
            <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
          </filter>
          <linearGradient id="slotFill" x1="0" x2="1">
            <stop offset="0" stop-color="#090d0b"/>
            <stop offset="1" stop-color="#151a17"/>
          </linearGradient>
          <marker id="arrowGreen" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto" markerUnits="strokeWidth">
            <path d="M0,0 L8,4 L0,8 Z" fill="#78d10d"/>
          </marker>
          <marker id="arrowOrange" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto" markerUnits="strokeWidth">
            <path d="M0,0 L8,4 L0,8 Z" fill="#ff7a12"/>
          </marker>
        </defs>

        <rect class="bg" x="0" y="0" width="1116" height="644" />

        <g class="headings">
          <text x="80" y="27">TOP 8 - 4 ROUNDS</text>
          <text x="410" y="27">SEMI FINALS</text>
          <text x="678" y="27">PRELIMINARY FINALS</text>
          <text x="947" y="27">GRAND FINAL</text>
        </g>

        <!-- WEEK 1 matchup connectors: exactly four yellow brackets -->
        <g class="matchup-connectors">
          <path d="M254 74 H300 V140 H254"/>
          <path d="M254 206 H300 V274 H254"/>
          <path d="M254 342 H300 V410 H254"/>
          <path d="M254 478 H300 V544 H254"/>
        </g>

        <!-- Winner / loser routes: exact requested structure -->
        <g class="routes">
          <!-- 1 v 4: winner skips week 2, loser enters Semi Final 1 -->
          <path class="winner" marker-end="url(#arrowGreen)" d="M300 82 H656"/>
          <path class="loser" marker-end="url(#arrowOrange)" d="M300 114 H365 V188 H424"/>

          <!-- 5 v 8: ONE winner line only into Semi Final 1 -->
          <path class="winner" marker-end="url(#arrowGreen)" d="M300 236 H424"/>

          <!-- 6 v 7: ONE winner line only into Semi Final 2 -->
          <path class="winner" marker-end="url(#arrowGreen)" d="M300 370 H424"/>

          <!-- 2 v 3: winner skips week 2, loser enters Semi Final 2 -->
          <path class="loser" marker-end="url(#arrowOrange)" d="M300 506 H365 V414 H424"/>
          <path class="winner" marker-end="url(#arrowGreen)" d="M300 522 H656"/>

          <!-- Semi-final winners cross over -->
          <path class="winner" marker-end="url(#arrowGreen)" d="M560 226 H592 L659 405"/>
          <path class="winner" marker-end="url(#arrowGreen)" d="M560 372 H592 L659 146"/>

          <!-- Preliminary-final winners into grand final -->
          <path class="winner" marker-end="url(#arrowGreen)" d="M841 113 H904 V289 H932"/>
          <path class="winner" marker-end="url(#arrowGreen)" d="M846 471 H904 V289"/>
          <path class="winner" marker-end="url(#arrowGreen)" d="M1059 289 H1100"/>
        </g>

        <!-- Route labels -->
        <g class="route-labels">
          <g transform="translate(357 82)"><circle class="win-dot" r="12"/><text y="5">W</text></g>
          <g transform="translate(365 143)"><circle class="lose-dot" r="12"/><text y="5">L</text></g>
          <g transform="translate(357 236)"><circle class="win-dot" r="12"/><text y="5">W</text></g>
          <g transform="translate(357 370)"><circle class="win-dot" r="12"/><text y="5">W</text></g>
          <g transform="translate(365 454)"><circle class="lose-dot" r="12"/><text y="5">L</text></g>
          <g transform="translate(357 522)"><circle class="win-dot" r="12"/><text y="5">W</text></g>
          <g transform="translate(592 226)"><circle class="win-dot" r="12"/><text y="5">W</text></g>
          <g transform="translate(592 372)"><circle class="win-dot" r="12"/><text y="5">W</text></g>
          <g transform="translate(872 113)"><circle class="win-dot" r="12"/><text y="5">W</text></g>
          <g transform="translate(872 471)"><circle class="win-dot" r="12"/><text y="5">W</text></g>
          <g transform="translate(1092 289)"><circle class="win-dot" r="12"/><text y="5">W</text></g>
        </g>

        <g id="week1"></g>

        <g id="laterMatches">
          <g class="match" transform="translate(424 166)" data-match="sf1">
            <rect width="136" height="120" rx="4"/>
            <text class="match-title" x="68" y="20" text-anchor="middle">SEMI FINAL 1</text>
            <g class="slot" transform="translate(10 38)"><rect width="116" height="28" rx="2"/><text class="slot-team" x="42" y="18">TBD</text><text class="slot-score" x="108" y="18" text-anchor="end">—</text></g>
            <g class="slot" transform="translate(10 72)"><rect width="116" height="28" rx="2"/><text class="slot-team" x="42" y="18">TBD</text><text class="slot-score" x="108" y="18" text-anchor="end">—</text></g>
          </g>
          <g class="match" transform="translate(424 326)" data-match="sf2">
            <rect width="136" height="120" rx="4"/>
            <text class="match-title" x="68" y="20" text-anchor="middle">SEMI FINAL 2</text>
            <g class="slot" transform="translate(10 38)"><rect width="116" height="28" rx="2"/><text class="slot-team" x="42" y="18">TBD</text><text class="slot-score" x="108" y="18" text-anchor="end">—</text></g>
            <g class="slot" transform="translate(10 72)"><rect width="116" height="28" rx="2"/><text class="slot-team" x="42" y="18">TBD</text><text class="slot-score" x="108" y="18" text-anchor="end">—</text></g>
          </g>
          <g class="match" transform="translate(656 64)" data-match="pf1">
            <rect width="185" height="116" rx="4"/>
            <text class="match-title" x="92.5" y="20" text-anchor="middle">PRELIMINARY FINAL 1</text>
            <g class="slot" transform="translate(10 38)"><rect width="165" height="28" rx="2"/><text class="slot-team" x="42" y="18">TBD</text><text class="slot-score" x="156" y="18" text-anchor="end">—</text></g>
            <g class="slot" transform="translate(10 72)"><rect width="165" height="28" rx="2"/><text class="slot-team" x="42" y="18">TBD</text><text class="slot-score" x="156" y="18" text-anchor="end">—</text></g>
          </g>
          <g class="match" transform="translate(660 438)" data-match="pf2">
            <rect width="186" height="116" rx="4"/>
            <text class="match-title" x="93" y="20" text-anchor="middle">PRELIMINARY FINAL 2</text>
            <g class="slot" transform="translate(10 38)"><rect width="166" height="28" rx="2"/><text class="slot-team" x="42" y="18">TBD</text><text class="slot-score" x="157" y="18" text-anchor="end">—</text></g>
            <g class="slot" transform="translate(10 72)"><rect width="166" height="28" rx="2"/><text class="slot-team" x="42" y="18">TBD</text><text class="slot-score" x="157" y="18" text-anchor="end">—</text></g>
          </g>
          <g class="match grand" transform="translate(932 236)" data-match="gf">
            <rect width="127" height="108" rx="4"/>
            <text class="match-title" x="63.5" y="20" text-anchor="middle">GRAND FINAL</text>
            <g class="slot" transform="translate(10 38)"><rect width="107" height="26" rx="2"/><text class="slot-team" x="40" y="17">TBD</text><text class="slot-score" x="99" y="17" text-anchor="end">—</text></g>
            <g class="slot" transform="translate(10 70)"><rect width="107" height="26" rx="2"/><text class="slot-team" x="40" y="17">TBD</text><text class="slot-score" x="99" y="17" text-anchor="end">—</text></g>
          </g>
        </g>

        <text id="meta" class="meta" x="1098" y="624" text-anchor="end">ROUND 19 · LADDER</text>
      </svg>
    </section>
  </main>

  <script src="app.js?v=exact-map-1"></script>
</body>
</html>
