<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,maximum-scale=1,user-scalable=no" />
  <meta name="theme-color" content="#050806" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>BIGOLE Knockout Cup</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <section class="rotate-gate" id="rotateGate">
    <div class="rotate-card">
      <div class="rotate-icon">↻</div>
      <h1>Rotate your phone</h1>
      <p>The complete finals map fits on one landscape screen.</p>
      <button id="landscapeButton" type="button">Open landscape</button>
    </div>
  </section>

  <main class="app-shell">
    <header class="topbar">
      <div class="brand"><span>🏆</span><strong>BIGOLE KNOCKOUT CUP</strong></div>
      <div class="title">Road to the title</div>
      <div class="status"><b id="roundBadge">ROUND —</b><em id="feedState">LOADING</em></div>
    </header>

    <section class="bracket" id="bracket" aria-label="Top eight four-week knockout bracket"></section>
  </main>

  <script src="app.js"></script>
</body>
</html>
