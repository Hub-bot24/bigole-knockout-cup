<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover" />
  <meta name="theme-color" content="#202a28" />
  <title>BIGOLE Knockout Cup</title>
  <link rel="stylesheet" href="styles.css?v=official-map-1" />
</head>
<body>
  <div id="rotateGate"><div><div class="phone">↻</div><strong>Rotate your phone</strong><span>This finals map is landscape only.</span></div></div>
  <main id="viewport">
    <section id="stage" aria-label="BIGOLE Knockout Cup finals bracket">
      <svg id="bracket" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
        <title id="title">BIGOLE Knockout Cup Top 8 Finals Series</title>
        <desc id="desc">Top four qualifying winners skip week two. Qualifying losers play elimination winners in week two.</desc>
        <defs>
          <filter id="glow" x="-50%" y="-50%" width="200%" height="200%"><feGaussianBlur stdDeviation="5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
          <linearGradient id="panel" x1="0" x2="0" y1="0" y2="1"><stop offset="0" stop-color="#35413f"/><stop offset="1" stop-color="#26312f"/></linearGradient>
          <linearGradient id="card" x1="0" x2="1"><stop offset="0" stop-color="#72803f"/><stop offset="1" stop-color="#89964e"/></linearGradient>
        </defs>

        <rect class="bg" x="0" y="0" width="1280" height="720" rx="4" />
        <rect class="top-line" x="0" y="0" width="1280" height="4" />
        <text class="kicker" x="36" y="42">FINALS SERIES</text><circle class="status-dot" cx="206" cy="35" r="12" />
        <text class="heading" x="640" y="42" text-anchor="middle">TOP 8 · 4 ROUNDS</text>
        <text class="meta" id="meta" x="1240" y="42" text-anchor="end">ROUND 19 · LADDER</text>

        <text class="week" x="42" y="91">WEEK 1</text><text class="sub" x="42" y="110">CURRENT SEEDING</text>
        <text class="week" x="360" y="91">WEEK 2</text><text class="sub" x="360" y="110">SEMI FINALS</text>
        <text class="week" x="672" y="91">WEEK 3</text><text class="sub" x="672" y="110">PRELIMINARY FINALS</text>
        <text class="week" x="1007" y="91">WEEK 4</text><text class="sub" x="1007" y="110">GRAND FINAL</text>

        <!-- official-style route geometry -->
        <g class="routes">
          <!-- QF1 winner bypass to PF1 -->
          <path d="M 240 150 H 600 V 178 H 676" />
          <!-- QF1 loser to SF1 -->
          <path d="M 240 150 H 282 V 224 H 360" />
          <!-- EF1 winner to SF1 -->
          <path d="M 240 264 H 282 V 224 H 360" />
          <!-- SF1 winner to PF2 -->
          <path d="M 548 224 H 600 V 422 H 676" />

          <!-- EF2 winner to SF2 -->
          <path d="M 240 378 H 282 V 492 H 360" />
          <!-- QF2 loser to SF2 -->
          <path d="M 240 606 H 282 V 492 H 360" />
          <!-- QF2 winner bypass to PF2 -->
          <path d="M 240 606 H 600 V 466 H 676" />
          <!-- SF2 winner to PF1 -->
          <path d="M 548 492 H 600 V 222 H 676" />

          <!-- PF winners to GF -->
          <path d="M 864 200 H 918 V 342 H 1007" />
          <path d="M 864 444 H 918 V 342 H 1007" />
          <path d="M 1195 342 H 1252" />
        </g>

        <!-- Junctions -->
        <g class="junctions">
          <circle cx="282" cy="224" r="12"/><circle cx="282" cy="492" r="12"/>
          <circle cx="600" cy="178" r="12"/><circle cx="600" cy="422" r="12"/>
          <circle cx="600" cy="466" r="12"/><circle cx="600" cy="222" r="12"/>
          <circle cx="918" cy="342" r="12"/><circle cx="1252" cy="342" r="12"/>
        </g>

        <!-- Week 1 seed cards -->
        <g id="week1"></g>

        <!-- Match boxes -->
        <g id="laterMatches">
          <g class="match" transform="translate(360 185)" data-match="sf1"><rect width="188" height="78" rx="5"/><text class="match-title" x="12" y="19">SEMI FINAL 1</text><g class="slot" transform="translate(10 30)"><rect width="168" height="20" rx="3"/><text class="slot-team" x="30" y="14">TBD</text><text class="slot-score" x="158" y="14" text-anchor="end">—</text></g><g class="slot" transform="translate(10 53)"><rect width="168" height="20" rx="3"/><text class="slot-team" x="30" y="14">TBD</text><text class="slot-score" x="158" y="14" text-anchor="end">—</text></g></g>
          <g class="match" transform="translate(360 453)" data-match="sf2"><rect width="188" height="78" rx="5"/><text class="match-title" x="12" y="19">SEMI FINAL 2</text><g class="slot" transform="translate(10 30)"><rect width="168" height="20" rx="3"/><text class="slot-team" x="30" y="14">TBD</text><text class="slot-score" x="158" y="14" text-anchor="end">—</text></g><g class="slot" transform="translate(10 53)"><rect width="168" height="20" rx="3"/><text class="slot-team" x="30" y="14">TBD</text><text class="slot-score" x="158" y="14" text-anchor="end">—</text></g></g>
          <g class="match" transform="translate(676 139)" data-match="pf1"><rect width="188" height="78" rx="5"/><text class="match-title" x="12" y="19">PRELIMINARY FINAL 1</text><g class="slot" transform="translate(10 30)"><rect width="168" height="20" rx="3"/><text class="slot-team" x="30" y="14">TBD</text><text class="slot-score" x="158" y="14" text-anchor="end">—</text></g><g class="slot" transform="translate(10 53)"><rect width="168" height="20" rx="3"/><text class="slot-team" x="30" y="14">TBD</text><text class="slot-score" x="158" y="14" text-anchor="end">—</text></g></g>
          <g class="match" transform="translate(676 405)" data-match="pf2"><rect width="188" height="78" rx="5"/><text class="match-title" x="12" y="19">PRELIMINARY FINAL 2</text><g class="slot" transform="translate(10 30)"><rect width="168" height="20" rx="3"/><text class="slot-team" x="30" y="14">TBD</text><text class="slot-score" x="158" y="14" text-anchor="end">—</text></g><g class="slot" transform="translate(10 53)"><rect width="168" height="20" rx="3"/><text class="slot-team" x="30" y="14">TBD</text><text class="slot-score" x="158" y="14" text-anchor="end">—</text></g></g>
          <g class="match grand" transform="translate(1007 303)" data-match="gf"><rect width="188" height="78" rx="5"/><text class="match-title" x="12" y="19">GRAND FINAL</text><g class="slot" transform="translate(10 30)"><rect width="168" height="20" rx="3"/><text class="slot-team" x="30" y="14">TBD</text><text class="slot-score" x="158" y="14" text-anchor="end">—</text></g><g class="slot" transform="translate(10 53)"><rect width="168" height="20" rx="3"/><text class="slot-team" x="30" y="14">TBD</text><text class="slot-score" x="158" y="14" text-anchor="end">—</text></g></g>
        </g>

        <g class="legend" transform="translate(36 690)"><text>TOP 4 WIN → SKIP WEEK 2</text><text x="258">TOP 4 LOSE → WEEK 2</text><text x="508">5–8 LOSE → OUT</text><text id="updated" x="1204" text-anchor="end">MANUAL SNAPSHOT</text></g>
      </svg>
    </section>
  </main>
  <script src="app.js?v=official-map-1"></script>
</body>
</html>
